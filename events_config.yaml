# Configuration des events Eastmile à surveiller.
#
# IMPORTANT :
# - "timezone" = le fuseau horaire du serveur de jeu (celui affiché comme
#   "Server time" sur https://wiki.eastmile.org). Compare l'heure affichée
#   là-bas avec ton heure actuelle pour choisir la bonne valeur.
#   Exemples valides : "Europe/Paris", "Europe/London", "UTC", "America/New_York"
#
# - Chaque event a :
#     name          : nom affiché dans l'alerte Discord
#     emoji         : emoji affiché devant le nom (optionnel)
#     times         : liste des horaires de démarrage, format "HH:MM" (24h),
#                     dans le fuseau horaire défini ci-dessus
#     days          : "all" (tous les jours) OU une liste de jours parmi
#                     [mon, tue, wed, thu, fri, sat, sun]
#     lead_minutes  : combien de minutes AVANT le début de l'event l'alerte
#                     doit être envoyée (5 = alerte 5 min avant)
#
# Pour compléter la liste, va sur chaque page d'event du wiki
# (https://wiki.eastmile.org/Events/calendar) et colle-moi le texte des
# horaires affichés — je m'occupe de les transformer dans ce format.

timezone: "Europe/Paris"
ping_role_id: "1523734601065828352"   # role mentionne dans chaque alerte (laisser vide pour desactiver)
check_window_minutes: 7   # doit être >= à l'intervalle du cron (voir workflow), marge de sécurité

events:
